name: Android CI/CD - Build APK

on:
  push:
    branches:
      - main # Trigger on push to the main branch
      - master # Also support master branch
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering of the workflow

env:
  # This can remain global as it doesn't use the 'runner' context
  GRADLE_USER_HOME: ~/.gradle

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    # Define job-level environment variables here.
    # The 'runner' context is available at the job level.
    env:
      # Set up environment variables for the Android SDK and NDK paths
      ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk
      ANDROID_NDK_HOME: ${{ runner.tool_cache }}/android-ndk
      # Define other project-specific environment variables if needed
      # For instance, if your project has a specific build variant name you want to pass:
      # MY_BUILD_VARIANT: "MyFlavorDebug"

    steps:
    - name: 📚 Checkout repository
      uses: actions/checkout@v4

    - name: ☕ Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 🤖 Setup Android SDK and NDK
      # This action automatically uses ANDROID_SDK_ROOT and ANDROID_NDK_HOME
      # if they are set in the job's environment, or sets them up.
      uses: android-actions/setup-android@v3
      with:
        api-level: 36
        ndk: '26.1.10909125' # Ensure this matches your project's NDK version or a compatible one
        cmake: '3.22.1'      # Ensure this matches your project's CMake version
        build-tools: '34.0.0'

    - name: ⚡ Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: ⚙️ Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🔑 Set up Keystore File
      # This step decodes your base64-encoded keystore file from a GitHub Secret
      # and places it in the expected location (app/Ktimazstudio.keystore).
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/Ktimazstudio.keystore
        echo "Keystore file 'app/Ktimazstudio.keystore' created."
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }} # This secret holds the base64 content of your .keystore file

    - name: 🌍 Set Signing Environment Variables for Gradle
      # These environment variables are read by your build.gradle.kts for signing.
      # Their values are pulled from GitHub Secrets and then set as job environment variables.
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        # Set KEYSTORE_PATH to the actual path where the keystore file was created
        echo "KEYSTORE_PATH=app/Ktimazstudio.keystore" >> $GITHUB_ENV
        
        # Set other signing credentials from GitHub Secrets
        echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
        
        echo "Signing environment variables set for Gradle."
      env:
        # These are used to provide the secret values to this step for the `echo` commands
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: 🔍 Run Android Lint checks
      run: ./gradlew lintDebug

    - name: 🧪 Run Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: 📦 Build Debug APK (for quick verification)
      run: ./gradlew assembleDebug

    - name: 🚀 Build Release APK
      # This command will use the signing config defined in build.gradle.kts
      # which now reads the necessary credentials from the environment variables set above.
      run: ./gradlew assembleRelease

    - name: ⬆️ Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Ktimazstudio-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 7
