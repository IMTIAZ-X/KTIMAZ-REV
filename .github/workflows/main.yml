name: Android CI/CD - Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  GRADLE_USER_HOME: ~/.gradle

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 10406996
          accept-android-sdk-licenses: true
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125
            cmake;3.22.1

      - name: ⚡ Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: ⚙️ Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🔑 Set up Keystore File
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/Ktimazstudio.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: 🌍 Set Signing Environment Variables for Gradle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "KEYSTORE_PATH=app/Ktimazstudio.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 🔍 Run Android Lint checks
        run: ./gradlew lintDebug

      - name: 🧪 Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: 📦 Build Debug APK
        run: ./gradlew assembleDebug

      - name: 🚀 Build Release APK
        run: ./gradlew assembleRelease

      - name: ⬆️ Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Ktimazstudio-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
